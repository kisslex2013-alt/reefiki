name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test runner
        run: python -m pip install --upgrade pip pytest

      - name: Validate current green wiki scope
        shell: pwsh
        run: |
          $files = @(git ls-files -- "projects/_template/wiki/*.md" "projects/reefiki/wiki/*.md" "projects/metrica/wiki/*.md")
          if ($files.Count -gt 0) {
            python scripts/validate_frontmatter.py @files
          }

      - name: Run tests
        run: python -m pytest

      - name: Run memory golden baseline
        run: python scripts/reefiki.py memory golden --project reefiki --format json
