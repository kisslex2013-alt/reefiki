<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="460" viewBox="0 0 1000 460" role="img" aria-labelledby="title desc">
  <title id="title">Слои памяти REEFIKI</title>
  <desc id="desc">Слоистая модель: от исходников и inbox до дистиллированной wiki и индекса.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#101418"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity=".25"/>
    </filter>
  </defs>
  <rect width="1000" height="460" rx="16" fill="url(#bg)"/>
  <g stroke="#585b70" stroke-opacity=".06" stroke-width="1">
    <path d="M0 80h1000M0 160h1000M0 240h1000M0 320h1000M0 400h1000"/>
    <path d="M125 0v460M250 0v460M375 0v460M500 0v460M625 0v460M750 0v460M875 0v460"/>
  </g>
  <text x="60" y="56" fill="#cdd6f4" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Слои памяти</text>
  <text x="60" y="84" fill="#a6adc8" font-family="Segoe UI, Arial, sans-serif" font-size="15">Захват дешёвый. Дистилляция осознанная. Поиск читает только полезный слой.</text>
  <!-- layer 4: raw (bottom, widest) -->
  <g filter="url(#shadow)">
    <rect x="60" y="376" width="880" height="60" rx="14" fill="#1e1e2e" stroke="#313244" stroke-width="1.5"/>
    <text x="100" y="413" fill="#6c7086" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700">raw/</text>
    <text x="190" y="413" fill="#585b70" font-family="Segoe UI, Arial, sans-serif" font-size="14">неизменяемый архив исходников</text>
  </g>
  <!-- layer 3: inbox -->
  <g filter="url(#shadow)">
    <rect x="90" y="300" width="820" height="60" rx="14" fill="#1e1e2e" stroke="#313244" stroke-width="1.5"/>
    <text x="130" y="337" fill="#a6adc8" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700">inbox/</text>
    <text x="240" y="337" fill="#6c7086" font-family="Segoe UI, Arial, sans-serif" font-size="14">захватить сейчас, разобрать позже</text>
  </g>
  <!-- layer 2: wiki (highlighted) -->
  <g filter="url(#shadow)">
    <rect x="120" y="220" width="760" height="64" rx="14" fill="#1e1e2e" stroke="#f5c2e7" stroke-width="1.5" stroke-opacity=".5"/>
    <text x="160" y="259" fill="#f5c2e7" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700">wiki/</text>
    <text x="250" y="259" fill="#a6adc8" font-family="Segoe UI, Arial, sans-serif" font-size="14">дистиллированная память: решения, навыки, концепты</text>
  </g>
  <!-- layer 1a: index.md -->
  <g filter="url(#shadow)">
    <rect x="150" y="148" width="310" height="58" rx="14" fill="#1e1e2e" stroke="#89b4fa" stroke-width="1.5" stroke-opacity=".5"/>
    <text x="190" y="183" fill="#89b4fa" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">index.md</text>
    <text x="310" y="183" fill="#585b70" font-family="Segoe UI, Arial, sans-serif" font-size="13">карта страниц</text>
  </g>
  <!-- layer 1b: log.md -->
  <g filter="url(#shadow)">
    <rect x="540" y="148" width="310" height="58" rx="14" fill="#1e1e2e" stroke="#cba6f7" stroke-width="1.5" stroke-opacity=".5"/>
    <text x="580" y="183" fill="#cba6f7" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">log.md</text>
    <text x="680" y="183" fill="#585b70" font-family="Segoe UI, Arial, sans-serif" font-size="13">след решений</text>
  </g>
</svg>
