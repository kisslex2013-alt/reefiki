<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="440" viewBox="0 0 1000 440" role="img" aria-labelledby="title desc">
  <title id="title">REEFIKI capture decision flow</title>
  <desc id="desc">When does knowledge become a wiki page, and when does it go to seen/.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#101418"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity=".25"/>
    </filter>
    <marker id="arry" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10z" fill="#a6e3a1"/>
    </marker>
    <marker id="arrn" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10z" fill="#fab387"/>
    </marker>
    <marker id="arrg" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10z" fill="#585b70"/>
    </marker>
  </defs>
  <rect width="1000" height="440" rx="16" fill="url(#bg)"/>
  <g stroke="#585b70" stroke-opacity=".06" stroke-width="1">
    <path d="M0 80h1000M0 160h1000M0 240h1000M0 320h1000M0 400h1000"/>
    <path d="M125 0v440M250 0v440M375 0v440M500 0v440M625 0v440M750 0v440M875 0v440"/>
  </g>
  <text x="60" y="56" fill="#cdd6f4" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">What deserves memory?</text>
  <text x="60" y="84" fill="#a6adc8" font-family="Segoe UI, Arial, sans-serif" font-size="15">REEFIKI saves procedures, decisions, and reusable context. The rest goes to seen/.</text>
  <g filter="url(#shadow)">
    <rect x="60" y="168" width="200" height="100" rx="16" fill="#1e1e2e" stroke="#313244" stroke-width="1.5"/>
    <text x="160" y="208" text-anchor="middle" fill="#cdd6f4" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">New source</text>
    <text x="160" y="232" text-anchor="middle" fill="#6c7086" font-family="Segoe UI, Arial, sans-serif" font-size="13">link, note, or file</text>
  </g>
  <path d="M260 218 L348 218" fill="none" stroke="#585b70" stroke-width="2" marker-end="url(#arrg)"/>
  <g filter="url(#shadow)">
    <rect x="356" y="148" width="228" height="140" rx="16" fill="#1e1e2e" stroke="#f5c2e7" stroke-width="1.5" stroke-opacity=".5"/>
    <text x="470" y="186" text-anchor="middle" fill="#f5c2e7" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">Useful later?</text>
    <text x="470" y="210" text-anchor="middle" fill="#a6adc8" font-family="Segoe UI, Arial, sans-serif" font-size="12">has a use scenario</text>
    <text x="470" y="230" text-anchor="middle" fill="#a6adc8" font-family="Segoe UI, Arial, sans-serif" font-size="12">not just interesting</text>
    <text x="470" y="250" text-anchor="middle" fill="#a6adc8" font-family="Segoe UI, Arial, sans-serif" font-size="12">not a duplicate</text>
  </g>
  <path d="M584 188 C640 188 670 168 720 158" fill="none" stroke="#a6e3a1" stroke-width="2" marker-end="url(#arry)"/>
  <text x="628" y="178" fill="#a6e3a1" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600">yes</text>
  <path d="M584 256 C640 256 670 296 720 306" fill="none" stroke="#fab387" stroke-width="2" marker-end="url(#arrn)"/>
  <text x="628" y="288" fill="#fab387" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600">no</text>
  <g filter="url(#shadow)">
    <rect x="728" y="118" width="212" height="90" rx="16" fill="#1e1e2e" stroke="#a6e3a1" stroke-width="1.5" stroke-opacity=".5"/>
    <text x="834" y="154" text-anchor="middle" fill="#a6e3a1" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700">wiki/</text>
    <text x="834" y="178" text-anchor="middle" fill="#6c7086" font-family="Segoe UI, Arial, sans-serif" font-size="12">decision, skill, concept</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="728" y="272" width="212" height="90" rx="16" fill="#1e1e2e" stroke="#fab387" stroke-width="1.5" stroke-opacity=".5"/>
    <text x="834" y="308" text-anchor="middle" fill="#fab387" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700">seen/</text>
    <text x="834" y="332" text-anchor="middle" fill="#6c7086" font-family="Segoe UI, Arial, sans-serif" font-size="12">30-day quarantine</text>
  </g>
</svg>
