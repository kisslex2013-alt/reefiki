<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="640" viewBox="0 0 1000 640" role="img" aria-labelledby="title desc">
  <title id="title">Obsidian 图谱预览 — REEFIKI wiki</title>
  <desc id="desc">REEFIKI 知识图谱：39 个页面，6 种类型（sources、concepts、synthesis、decisions、skills、entity）。节点颜色和大小反映类型与使用频率。</desc>

  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>

  <!-- Window frame -->
  <rect width="1000" height="640" rx="12" fill="url(#bg)"/>
  <rect x="0" y="0" width="1000" height="32" rx="12" fill="#0f0f23"/>
  <rect x="0" y="16" width="1000" height="16" fill="#0f0f23"/>
  <circle cx="20" cy="16" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="16" r="6" fill="#febc2e"/>
  <circle cx="60" cy="16" r="6" fill="#28c840"/>
  <text x="500" y="21" text-anchor="middle" fill="#6c7086" font-family="Segoe UI, Arial, sans-serif" font-size="13">Graph View — reefiki wiki</text>

  <!-- Edges -->
  <g stroke="#44475a" stroke-opacity=".25" stroke-width="1">
    <line x1="130" y1="160" x2="180" y2="120"/>
    <line x1="130" y1="160" x2="100" y2="220"/>
    <line x1="180" y1="120" x2="230" y2="150"/>
    <line x1="100" y1="220" x2="150" y2="260"/>
    <line x1="180" y1="120" x2="150" y2="260"/>
    <line x1="230" y1="150" x2="200" y2="210"/>
    <line x1="320" y1="180" x2="380" y2="140"/>
    <line x1="320" y1="180" x2="290" y2="250"/>
    <line x1="380" y1="140" x2="430" y2="180"/>
    <line x1="290" y1="250" x2="350" y2="300"/>
    <line x1="430" y1="180" x2="380" y2="260"/>
    <line x1="350" y1="300" x2="400" y2="340"/>
    <line x1="320" y1="180" x2="430" y2="180"/>
    <line x1="290" y1="250" x2="380" y2="260"/>
    <line x1="580" y1="150" x2="640" y2="120"/>
    <line x1="580" y1="150" x2="550" y2="220"/>
    <line x1="640" y1="120" x2="700" y2="160"/>
    <line x1="550" y1="220" x2="620" y2="270"/>
    <line x1="700" y1="160" x2="660" y2="240"/>
    <line x1="620" y1="270" x2="680" y2="310"/>
    <line x1="580" y1="150" x2="700" y2="160"/>
    <line x1="550" y1="220" x2="660" y2="240"/>
    <line x1="640" y1="120" x2="720" y2="200"/>
    <line x1="200" y1="400" x2="270" y2="370"/>
    <line x1="200" y1="400" x2="160" y2="460"/>
    <line x1="270" y1="370" x2="330" y2="410"/>
    <line x1="160" y1="460" x2="240" y2="500"/>
    <line x1="330" y1="410" x2="290" y2="470"/>
    <line x1="200" y1="400" x2="330" y2="410"/>
    <line x1="580" y1="400" x2="650" y2="370"/>
    <line x1="580" y1="400" x2="540" y2="460"/>
    <line x1="650" y1="370" x2="720" y2="410"/>
    <line x1="540" y1="460" x2="610" y2="500"/>
    <line x1="720" y1="410" x2="680" y2="470"/>
    <line x1="580" y1="400" x2="720" y2="410"/>
    <line x1="650" y1="370" x2="610" y2="500"/>
    <line x1="540" y1="460" x2="680" y2="470"/>
    <line x1="870" y1="300" x2="700" y2="160"/>
    <line x1="870" y1="300" x2="720" y2="410"/>
    <line x1="230" y1="150" x2="320" y2="180" stroke-opacity=".15"/>
    <line x1="430" y1="180" x2="580" y2="150" stroke-opacity=".15"/>
    <line x1="350" y1="300" x2="550" y2="220" stroke-opacity=".15"/>
    <line x1="270" y1="370" x2="400" y2="340" stroke-opacity=".15"/>
    <line x1="400" y1="340" x2="580" y2="400" stroke-opacity=".15"/>
    <line x1="240" y1="500" x2="540" y2="460" stroke-opacity=".15"/>
  </g>

  <!-- Sources (blue) -->
  <g filter="url(#glow)">
    <circle cx="130" cy="160" r="7" fill="#89b4fa" opacity=".9"/>
    <circle cx="180" cy="120" r="7" fill="#89b4fa" opacity=".9"/>
    <circle cx="230" cy="150" r="7" fill="#89b4fa" opacity=".9"/>
    <circle cx="100" cy="220" r="7" fill="#89b4fa" opacity=".9"/>
    <circle cx="150" cy="260" r="8" fill="#89b4fa" opacity=".9"/>
    <circle cx="200" cy="210" r="7" fill="#89b4fa" opacity=".9"/>
  </g>

  <!-- Concepts (green) -->
  <g filter="url(#glow)">
    <circle cx="320" cy="180" r="9" fill="#a6e3a1" opacity=".9"/>
    <circle cx="380" cy="140" r="8" fill="#a6e3a1" opacity=".9"/>
    <circle cx="430" cy="180" r="8" fill="#a6e3a1" opacity=".9"/>
    <circle cx="290" cy="250" r="7" fill="#a6e3a1" opacity=".9"/>
    <circle cx="350" cy="300" r="9" fill="#a6e3a1" opacity=".9"/>
    <circle cx="400" cy="340" r="7" fill="#a6e3a1" opacity=".9"/>
    <circle cx="380" cy="260" r="7" fill="#a6e3a1" opacity=".9"/>
    <circle cx="460" cy="250" r="7" fill="#a6e3a1" opacity=".9"/>
  </g>

  <!-- Synthesis (purple) -->
  <g filter="url(#glow)">
    <circle cx="580" cy="150" r="8" fill="#cba6f7" opacity=".9"/>
    <circle cx="640" cy="120" r="10" fill="#cba6f7" opacity=".9"/>
    <circle cx="700" cy="160" r="8" fill="#cba6f7" opacity=".9"/>
    <circle cx="550" cy="220" r="7" fill="#cba6f7" opacity=".9"/>
    <circle cx="620" cy="270" r="8" fill="#cba6f7" opacity=".9"/>
    <circle cx="660" cy="240" r="7" fill="#cba6f7" opacity=".9"/>
    <circle cx="680" cy="310" r="7" fill="#cba6f7" opacity=".9"/>
    <circle cx="720" cy="200" r="8" fill="#cba6f7" opacity=".9"/>
    <circle cx="750" cy="270" r="7" fill="#cba6f7" opacity=".9"/>
  </g>

  <!-- Decisions (orange) -->
  <g filter="url(#glow)">
    <circle cx="200" cy="400" r="9" fill="#fab387" opacity=".9"/>
    <circle cx="270" cy="370" r="8" fill="#fab387" opacity=".9"/>
    <circle cx="330" cy="410" r="8" fill="#fab387" opacity=".9"/>
    <circle cx="160" cy="460" r="7" fill="#fab387" opacity=".9"/>
    <circle cx="240" cy="500" r="7" fill="#fab387" opacity=".9"/>
    <circle cx="290" cy="470" r="8" fill="#fab387" opacity=".9"/>
    <circle cx="370" cy="470" r="7" fill="#fab387" opacity=".9"/>
  </g>

  <!-- Skills (pink) -->
  <g filter="url(#glow)">
    <circle cx="580" cy="400" r="8" fill="#f5c2e7" opacity=".9"/>
    <circle cx="650" cy="370" r="9" fill="#f5c2e7" opacity=".9"/>
    <circle cx="720" cy="410" r="8" fill="#f5c2e7" opacity=".9"/>
    <circle cx="540" cy="460" r="7" fill="#f5c2e7" opacity=".9"/>
    <circle cx="610" cy="500" r="8" fill="#f5c2e7" opacity=".9"/>
    <circle cx="680" cy="470" r="7" fill="#f5c2e7" opacity=".9"/>
    <circle cx="750" cy="450" r="7" fill="#f5c2e7" opacity=".9"/>
    <circle cx="570" cy="530" r="7" fill="#f5c2e7" opacity=".9"/>
    <circle cx="640" cy="540" r="7" fill="#f5c2e7" opacity=".9"/>
    <circle cx="710" cy="520" r="7" fill="#f5c2e7" opacity=".9"/>
  </g>

  <!-- Entity (teal) -->
  <circle cx="870" cy="300" r="10" fill="#94e2d5" opacity=".9" filter="url(#glow)"/>

  <!-- Labels -->
  <g fill="#cdd6f4" font-family="Segoe UI, Arial, sans-serif" font-size="11">
    <text x="320" y="170" text-anchor="middle" font-weight="600">contract</text>
    <text x="350" y="290" text-anchor="middle" font-weight="600">memory</text>
    <text x="640" y="110" text-anchor="middle" font-weight="600">reefiki-2</text>
    <text x="200" y="390" text-anchor="middle" font-weight="600">v1→v2</text>
    <text x="650" y="360" text-anchor="middle" font-weight="600">skills</text>
    <text x="870" y="290" text-anchor="middle" font-weight="600">obsidian</text>
    <text x="580" y="140" text-anchor="middle">governance</text>
    <text x="130" y="150" text-anchor="middle">karpathy</text>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 555)" fill="#6c7086" font-family="Segoe UI, Arial, sans-serif" font-size="12">
    <circle cx="0" cy="0" r="5" fill="#89b4fa"/><text x="10" y="4">来源</text>
    <circle cx="65" cy="0" r="5" fill="#a6e3a1"/><text x="75" y="4">概念</text>
    <circle cx="130" cy="0" r="5" fill="#cba6f7"/><text x="140" y="4">综合</text>
    <circle cx="195" cy="0" r="5" fill="#fab387"/><text x="205" y="4">决策</text>
    <circle cx="260" cy="0" r="5" fill="#f5c2e7"/><text x="270" y="4">技能</text>
    <circle cx="325" cy="0" r="5" fill="#94e2d5"/><text x="335" y="4">实体</text>
  </g>

  <text x="940" y="615" text-anchor="end" fill="#585b70" font-family="Segoe UI, Arial, sans-serif" font-size="12">39 个页面 · 6 种类型</text>
</svg>
