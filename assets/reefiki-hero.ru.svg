<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="380" viewBox="0 0 1200 380" role="img" aria-labelledby="title desc">
  <title id="title">Поток дистилляции REEFIKI</title>
  <desc id="desc">Шум сессии проходит фильтр и становится полезной проектной памятью.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#101418"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity=".25"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10z" fill="#f5c2e7"/>
    </marker>
  </defs>
  <rect width="1200" height="380" rx="16" fill="url(#bg)"/>
  <!-- grid -->
  <g stroke="#585b70" stroke-opacity=".06" stroke-width="1">
    <path d="M0 76h1200M0 152h1200M0 228h1200M0 304h1200"/>
    <path d="M150 0v380M300 0v380M450 0v380M600 0v380M750 0v380M900 0v380M1050 0v380"/>
  </g>
  <!-- title -->
  <text x="60" y="62" fill="#cdd6f4" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">Поток дистилляции</text>
  <text x="60" y="96" fill="#a6adc8" font-family="Segoe UI, Arial, sans-serif" font-size="16">Не архив сессий — слой смысла. Сохраняется только то, что можно применить снова.</text>
  <!-- card 1: noise -->
  <g filter="url(#shadow)">
    <rect x="60" y="148" width="260" height="160" rx="16" fill="#1e1e2e" stroke="#313244" stroke-width="1.5"/>
    <text x="88" y="186" fill="#cdd6f4" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700">Шум сессии</text>
    <text x="88" y="216" fill="#6c7086" font-family="Segoe UI, Arial, sans-serif" font-size="14">фрагменты чата</text>
    <text x="88" y="240" fill="#6c7086" font-family="Segoe UI, Arial, sans-serif" font-size="14">ссылки и файлы</text>
    <text x="88" y="264" fill="#6c7086" font-family="Segoe UI, Arial, sans-serif" font-size="14">временный контекст</text>
    <text x="88" y="292" fill="#585b70" font-family="Segoe UI, Arial, sans-serif" font-size="13">inbox/ · raw/</text>
  </g>
  <!-- arrow 1 -->
  <path d="M328 228 C380 228 420 228 460 228" fill="none" stroke="#f5c2e7" stroke-width="2.5" stroke-dasharray="6 3" marker-end="url(#arrow)"/>
  <!-- card 2: filter -->
  <g filter="url(#shadow)">
    <rect x="468" y="128" width="264" height="200" rx="16" fill="#1e1e2e" stroke="#f5c2e7" stroke-width="1.5" stroke-opacity=".5"/>
    <text x="496" y="168" fill="#f5c2e7" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700">Фильтр смысла</text>
    <text x="496" y="200" fill="#a6adc8" font-family="Segoe UI, Arial, sans-serif" font-size="13">useful_when заполнен?</text>
    <text x="496" y="222" fill="#a6adc8" font-family="Segoe UI, Arial, sans-serif" font-size="13">не дубликат существующего?</text>
    <text x="496" y="244" fill="#a6adc8" font-family="Segoe UI, Arial, sans-serif" font-size="13">есть метод, не факт?</text>
    <text x="496" y="266" fill="#a6adc8" font-family="Segoe UI, Arial, sans-serif" font-size="13">полезно через 3 месяца?</text>
    <!-- filter bars -->
    <rect x="496" y="286" width="120" height="8" rx="4" fill="#f5c2e7" opacity=".7"/>
    <rect x="496" y="300" width="80" height="8" rx="4" fill="#f5c2e7" opacity=".4"/>
    <rect x="496" y="314" width="40" height="8" rx="4" fill="#f5c2e7" opacity=".2"/>
  </g>
  <!-- arrow 2 -->
  <path d="M740 228 C790 228 820 228 868 228" fill="none" stroke="#a6e3a1" stroke-width="2.5" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10z" fill="#a6e3a1"/>
    </marker>
  </defs>
  <path d="M740 228 C790 228 820 228 868 228" fill="none" stroke="#a6e3a1" stroke-width="2.5" marker-end="url(#arrow2)"/>
  <!-- card 3: wiki -->
  <g filter="url(#shadow)">
    <rect x="876" y="148" width="264" height="160" rx="16" fill="#1e1e2e" stroke="#a6e3a1" stroke-width="1.5" stroke-opacity=".5"/>
    <text x="904" y="186" fill="#a6e3a1" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700">Полезная wiki-память</text>
    <g fill="#bac2de" font-family="Segoe UI, Arial, sans-serif" font-size="14">
      <circle cx="916" cy="218" r="3" fill="#89b4fa"/>
      <text x="928" y="222" fill="#89b4fa">источники</text>
      <circle cx="916" cy="244" r="3" fill="#cba6f7"/>
      <text x="928" y="248" fill="#cba6f7">концепты</text>
      <circle cx="916" cy="270" r="3" fill="#fab387"/>
      <text x="928" y="274" fill="#fab387">решения</text>
      <circle cx="1060" cy="218" r="3" fill="#f5c2e7"/>
      <text x="1072" y="222" fill="#f5c2e7">навыки</text>
      <circle cx="1060" cy="244" r="3" fill="#a6e3a1"/>
      <text x="1072" y="248" fill="#a6e3a1">синтез</text>
    </g>
    <text x="904" y="296" fill="#585b70" font-family="Segoe UI, Arial, sans-serif" font-size="13">wiki/ · index.md</text>
  </g>
</svg>
